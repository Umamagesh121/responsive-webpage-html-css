<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Contact Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            background: linear-gradient(135deg,
                    rgba(13, 71, 161, 1),
                    rgba(0, 151, 167, .95),
                    rgba(0, 200, 83, .90));
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, .97);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, .25);
        }

        h1 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 8px;
            font-size: 35px;
        }

        p {
            text-align: center;
            color: #64748b;
            margin-bottom: 35px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .column {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 13px;
            border: 2px solid rgba(203, 213, 225, 1);
            border-radius: 12px;
            font-size: 15px;
            transition: .3s;
            background: #fff;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 10px rgba(37, 99, 235, .25);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 8px;
            margin-bottom: 20px;
        }

        .radio-group label,
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        .submit {
            background: #22c55e;
            color: white;
            box-shadow: 0 8px 20px rgba(34, 197, 94, .35);
        }

        .submit:hover {
            background: #16a34a;
            transform: translateY(-3px);
        }

        .reset {
            background: #ef4444;
            color: white;
            box-shadow: 0 8px 20px rgba(239, 68, 68, .35);
        }

        .reset:hover {
            background: #dc2626;
            transform: translateY(-3px);
        }

        @media(max-width:768px) {

            .row {
                flex-direction: column;
                gap: 0;
            }

            .buttons {
                flex-direction: column;
            }

            .container {
                padding: 25px;
            }

            h1 {
                font-size: 28px;
            }

        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Contact Form</h1>

        <p>Please fill in the details below.</p>

        <form>

            <div class="row">

                <div class="column">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name" required>
                </div>

                <div class="column">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>

            </div>

            <div class="row">

                <div class="column">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="9876543210">
                </div>

                <div class="column">
                    <label>Password</label>
                    <input type="password" placeholder="Password">
                </div>

            </div>

            <div class="row">

                <div class="column">
                    <label>Date</label>
                    <input type="date">
                </div>

                <div class="column">
                    <label>Preferred Time</label>
                    <input type="time">
                </div>

            </div>

            <label>Subject</label>
            <input type="text" placeholder="Enter subject">

            <br><br>

            <label>Department</label>

            <select>
                <option>Select Department</option>
                <option>Sales</option>
                <option>Support</option>
                <option>Technical</option>
                <option>Marketing</option>
            </select>

            <br><br>

            <label>Gender</label>

            <div class="radio-group">

                <label><input type="radio" name="gender"> Male</label>

                <label><input type="radio" name="gender"> Female</label>

                <label><input type="radio" name="gender"> Other</label>

            </div>

            <label>Services Required</label>

            <div class="checkbox-group">

                <label><input type="checkbox"> Website</label>

                <label><input type="checkbox"> Mobile App</label>

                <label><input type="checkbox"> UI/UX Design</label>

                <label><input type="checkbox"> SEO</label>

            </div>

            <label>Website URL</label>
            <input type="url" placeholder="https://example.com">

            <br><br>

            <label>Upload File</label>
            <input type="file">

            <br><br>

            <label>Age</label>
            <input type="number" min="18" max="100">

            <br><br>

            <label>Experience Level</label>
            <input type="range" min="0" max="10">

            <br><br>

            <label>Favorite Color</label>
            <input type="color">

            <br><br>

            <label>Search</label>
            <input type="search" placeholder="Search...">

            <br><br>

            <label>Your Message</label>

            <textarea placeholder="Write your message here..."></textarea>

            <div class="buttons">

                <button type="submit" class="submit">
                    Send Message
                </button>

                <button type="reset" class="reset">
                    Reset Form
                </button>

            </div>

        </form>

    </div>

</body>

</html>
